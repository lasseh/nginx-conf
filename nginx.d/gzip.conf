gzip 			on;
# Increasing the compression level will lead to increased CPU usage
gzip_comp_level 	6;
gzip_min_length		1000;
gzip_buffers		4 4k;
gzip_disable 		msie6;
gzip_vary 		on;
gzip_http_version 	1.0;
gzip_proxied 		any;
gzip_types      	application/atom+xml
                       	application/javascript
                        application/json
                        application/rss+xml
                        application/vnd.ms-fontobject
			application/x-font-ttf
			application/x-web-app-manifest+json
			application/xhtml+xml
			application/xml
			font/opentype
			image/svg+xml
			image/x-icon
			text/css
			text/plain
			text/x-component;
